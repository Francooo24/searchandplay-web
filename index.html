<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greek Dictionary</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🏛️ Greek Dictionary</h1>
    <p class="subtitle">Search in English or Greek</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Type a word... (e.g. love or ἀγάπη)" />
      <button onclick="search()">Search</button>
    </div>
    <div id="results"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
